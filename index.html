<html>

<head>
<title>
    Origins of Modern Energy Sources
</title>

<style>
    .row{
        width:1000px;
        margin: 10px auto 10px auto ;
    }
    .image-container {
        display: table-cell;
        vertical-align: middle;
        padding:20px;
    }
</style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/buzz/1.2.1/buzz.min.js"></script>

</head>

<body style="background-color: rgb(150, 210, 215);">

    <div class="row">
        <div class="image-container"><img id="hydro" src="img/Hydro1.png" onclick="this.src='img/Hydro2.png';" onmouseout="this.src='img/Hydro1.png';" height="300" width="300"/></div>
        <div class="image-container"><img id="tidal" src="img/Tidal1.png" onclick="this.src='img/Tidal2.png';" onmouseout="this.src='img/Tidal1.png';" height="300" width="300"/></div>
        <div class="image-container"><img id="geothermal" src="img/Geothermal1.png" onclick="this.src='img/Geothermal2.png';" onmouseout="this.src='img/Geothermal1.png';" height="300" width="300"/></div>
    </div>

    <div class="row">
        <div class="image-container"><img id="solar" src="img/Solar1.png" onclick="this.src='img/Solar2.png';" onmouseout="this.src='img/Solar1.png';" height="300" width="300"/></div>
        
        <div class="image-container"><img id="wind" src="img/Wind1.png" onclick="this.src='img/Wind2.png';" onmouseout="this.src='img/Wind1.png';" height="300" width="300"/></div>
        <div class="image-container"><img id="biomass" src="img/Biomass1.png" onclick="this.src='img/Biomass2.png';" onmouseout="this.src='img/Biomass1.png';" height="300" width="300"/></div>
    </div>

    <div class="row">
        <div class="image-container"><img id="coal" src="img/Coal1.png" onclick="this.src='img/Coal2.png';" onmouseout="this.src='img/Coal1.png';" height="300" width="300"/></div>
        <div class="image-container"><img id="oil" src="img/Oil1.png" onclick="this.src='img/Oil2.png';" onmouseout="this.src='img/Oil1.png';" height="300" width="300"/></div>
        <div class="image-container"><img id="nuclear" src="img/Nuclear1.png" onclick="this.src='img/Nuclear2.png';" onmouseout="this.src='img/Nuclear1.png';" height="300" width="300"/></div>
    </div>

    <script>
        var sound1 = new buzz.sound("sound/Hydro.mp3");
        var sound2 = new buzz.sound("sound/Tidal.mp3");
        var sound3 = new buzz.sound("sound/Geothermal.mp3");
        var sound4 = new buzz.sound("sound/Solar.mp3");
        var sound5 = new buzz.sound("sound/WindRush.mp3");
        var sound6 = new buzz.sound("sound/Biomass.mp3");
        var sound7 = new buzz.sound("sound/Coal.mp3");
        var sound8 = new buzz.sound("sound/Oil.mp3");
        var sound9 = new buzz.sound("sound/Nuclear.mp3");

        window.onload = function(){
            document.getElementById('hydro').addEventListener('click', function () {sound1.play();});
            document.getElementById('tidal').addEventListener('click', function () {sound2.play();});
            document.getElementById('geothermal').addEventListener('click', function () {sound3.play();});
            document.getElementById('solar').addEventListener('click', function () {sound4.play();});
            document.getElementById('wind').addEventListener('click', function () {sound5.play();});
            document.getElementById('wind').addEventListener('mouseout', function () {sound5.play();});
            document.getElementById('biomass').addEventListener('click', function () {sound6.play();});
            document.getElementById('coal').addEventListener('click', function () {sound7.play();});
            document.getElementById('oil').addEventListener('click', function () {sound8.play();});
            document.getElementById('nuclear').addEventListener('click', function () {sound9.play();});
        };
    </script>

</body>

</html>
