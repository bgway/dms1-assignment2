<html>

<head>
<title>
    Origins of Modern Energy Sources
</title>

<style>
    .row{
        width:720px;
        margin: 10px auto 10px auto ;
    }
    .image-container {
        display: table-cell;
        vertical-align: middle;
        padding:20px;
    }
</style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/buzz/1.2.1/buzz.min.js"></script>

</head>

<body style="background-color: rgb(255, 255, 255);">

    <div class="row">
        <div class="image-container"><img id="wd1" src="img/UncWind1.png" onmouseover="this.src='img/UncWind2.png';" onmouseout="this.src='img/UncWind1.png';" height="300" width="300"/></div>
        <div class="image-container"><img id="wd2" src="img/UncWind2.png" onmouseover="this.src='img/UncWind1.png';" onmouseout="this.src='img/UncWind2.png';" height="300" width="300"/></div>
        <div class="image-container"><img id="squ" src="img/squ.png" onmouseover="this.src='img/hex.png';" onmouseout="this.src='img/squ.png';" height="300" width="300"/></div>
    </div>

    <div class="row">
        <div class="image-container"><img id="hex" src="img/hex.png" onmouseover="this.src='img/rec.png';" onmouseout="this.src='img/hex.png';" height="300" width="300"/></div>
        <div class="image-container"><img id="rec" src="img/rec.png" onmouseover="this.src='img/sta.png';" onmouseout="this.src='img/rec.png';" height="300" width="300"/></div>
        <div class="image-container"><img id="sta" src="img/sta.png" onmouseover="this.src='img/trr.png';" onmouseout="this.src='img/sta.png';" height="300" width="300"/></div>
    </div>

    <div class="row">
        <div class="image-container"><img id="trr" src="img/trr.png" onmouseover="this.src='img/sqr.png';" onmouseout="this.src='img/trr.png';" height="300" width="300"/></div>
        <div class="image-container"><img id="sqr" src="img/sqr.png" onmouseover="this.src='img/her.png';" onmouseout="this.src='img/sqr.png';" height="300" width="300"/></div>
        <div class="image-container"><img id="her" src="img/her.png" onmouseover="this.src='img/cir.png';" onmouseout="this.src='img/her.png';" height="300" width="300"/></div>
    </div>

    <script>
        var sound1 = new buzz.sound("sound/FingerSnap.mp3");
        var sound2 = new buzz.sound("sound/WindRush.mp3");

        window.onload = function(){
            document.getElementById('wd1').addEventListener('mouseover', function () {sound2.play();});
            document.getElementById('wd1').addEventListener('mouseout', function () {sound2.play();});
            document.getElementById('wd2').addEventListener('mouseover', function () {sound2.play();});
            document.getElementById('wd2').addEventListener('mouseout', function () {sound2.play();});
            document.getElementById('squ').addEventListener('click', function () {sound1.play();});
            document.getElementById('hex').addEventListener('click', function () {sound1.play();});
            document.getElementById('rec').addEventListener('click', function () {sound1.play();});
            document.getElementById('sta').addEventListener('click', function () {sound1.play();});
            document.getElementById('trr').addEventListener('click', function () {sound1.play();});
            document.getElementById('sqr').addEventListener('click', function () {sound1.play();});
            document.getElementById('her').addEventListener('click', function () {sound1.play();});
        };
    </script>

</body>

</html>
